name: Deploy site

on:
  push:
    branches:
      - main
    paths-ignore:
      - "lighthouse_results/**"
      - "CONTRIBUTING.md"
      - "CUSTOMIZE.md"
      - "FAQ.md"
      - "INSTALL.md"
      - "README.md"
      - ".github/workflows/axe.yml"
      - ".github/workflows/broken-links.yml"
      - ".github/workflows/lighthouse-badger.yml"
      - ".github/workflows/prettier.yml"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "lighthouse_results/**"
      - "CONTRIBUTING.md"
      - "CUSTOMIZE.md"
      - "FAQ.md"
      - "INSTALL.md"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Update npm
        run: npm install -g npm@11

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
